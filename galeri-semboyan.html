<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Galeri Semboyan PD 3 — Perpustakaan Dinas</title>
<meta name="description" content="Galeri lengkap semboyan perkeretaapian PD 3. Isyarat, tanda, sinyal, dan marka kereta api Indonesia.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 28px 20px 24px;
    text-align: center;
  }

  header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  header p { font-size: 13px; color: #a0aec0; margin-bottom: 16px; }

  .search-wrap {
    display: flex;
    max-width: 500px;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  #filterInput {
    flex: 1; padding: 11px 16px; font-size: 14px;
    border: none; outline: none; background: #fff; color: #1a1a2e;
  }
  #filterInput::placeholder { color: #a0aec0; }

  .clear-btn {
    background: #2d3748; border: none; padding: 11px 16px;
    color: #a0aec0; font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { background: #4a5568; color: #fff; }

  .back-link {
    display: inline-block;
    margin-top: 12px;
    color: #a0aec0;
    font-size: 12px;
    text-decoration: none;
  }
  .back-link:hover { color: #fff; }

  /* ── STATS ── */
  #statsBar {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #718096;
    background: #edf2f7;
    border-bottom: 1px solid #e2e8f0;
  }

  #statsBar b { color: #2d3748; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 20px auto;
    padding: 0 16px 40px;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  /* Banner kode — warna per kategori */
  .card-code {
    padding: 10px 14px;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.05em;
  }

  /* Gambar semboyan */
  .card-img {
    background: #f7faff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 160px;
    overflow: hidden;
    border-bottom: 1px solid #e2e8f0;
  }

  .card-img img {
    max-width: 100%;
    max-height: 200px;
    object-fit: contain;
    padding: 8px;
  }

  .no-img {
    color: #a0aec0;
    font-size: 12px;
    text-align: center;
    padding: 20px;
  }

  /* Info bawah */
  .card-body { padding: 10px 14px 12px; flex: 1; }

  .card-name {
    font-size: 12px;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .card-desc {
    font-size: 11px;
    color: #718096;
    line-height: 1.6;
  }

  /* Banner oranye nama semboyan */
  .card-footer {
    background: #ed8936;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 5px 10px;
    text-align: center;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── EMPTY STATE ── */
  #emptyState {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: #a0aec0;
    font-size: 14px;
  }

  .cat-isyarat   { background: #2b6cb0; }
  .cat-tanda     { background: #276749; }
  .cat-sinyal    { background: #553c9a; }
  .cat-marka     { background: #744210; }
  .cat-semboyan  { background: #9b2335; }
  .cat-default   { background: #2d3748; }
</style>

// ── Tentukan kategori warna berdasarkan nama ──
function getCategory(nama) {
  const n = nama.toLowerCase();
  if (n.includes('isyarat')) return 'cat-isyarat';
  if (n.includes('sinyal'))  return 'cat-sinyal';
  if (n.includes('marka'))   return 'cat-marka';
  if (n.includes('tanda'))   return 'cat-tanda';
  return 'cat-semboyan';
}

// ── Nama file gambar: "SEMBOYAN X - NAMA.png" ──
function imgPath(s) {
  return `gambar/${encodeURIComponent('SEMBOYAN ' + s.kode + ' - ' + s.nama + '.png')}`;
}

// ── Render cards ──
function render(list) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';

  if (!list.length) {
    empty.style.display = 'block';
    document.getElementById('countShown').textContent = '0';
    return;
  }

  empty.style.display = 'none';
  document.getElementById('countShown').textContent = list.length;

  list.forEach(s => {
    const cat  = getCategory(s.nama);
    const path = imgPath(s);

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-code ${cat}">Semboyan ${s.kode}</div>
      <div class="card-img">
        <img src="${path}" alt="Semboyan ${s.kode}" 
             onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>📷 Gambar belum tersedia</div>'" />
      </div>
      <div class="card-body">
        <div class="card-desc">${s.desc}</div>
      </div>
      <div class="card-footer">${s.nama}</div>
    `;
    grid.appendChild(card);
  });
}

// ── Filter ──
function filter() {
  const q = document.getElementById('filterInput').value.toLowerCase().trim();
  if (!q) { render(SEMBOYAN); return; }
  const filtered = SEMBOYAN.filter(s =>
    s.kode.toLowerCase().includes(q) ||
    s.nama.toLowerCase().includes(q) ||
    s.desc.toLowerCase().includes(q)
  );
  render(filtered);
}

function clearFilter() {
  document.getElementById('filterInput').value = '';
  render(SEMBOYAN);
}

document.getElementById('filterInput').addEventListener('input', filter);

// ── Init ──
render(SEMBOYAN);
</script>
